<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            flex-wrap: wrap;
            font-size: 30px;
            margin: 0px auto;
            padding: none;
            overflow: hidden;
            font-family: ArialArial, Helvetica;
        }

        .ctn {
            width: 100%;
            height: 500px;
            background: #bbb;
            border-radius: 10px;
            position: relative;
            top: 160px;
            display: flex;
            overflow: hidden;
        }

        .lt {
            background: linear-gradient(to right bottom, navy, purple, crimson);
            width: 75%;
            height: 100%;
            border-radius: 10px 100px 100px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.95s ease;
            transform: translateX(-0px);
        }

        .ct {
            width: 95%;
            height: 95%;
        }

        #email {
            width: 90%;
            text-align: center;
            height: 35px;
            border-radius: 4px;
            border: none;
            transition: all 0.2s ease-in-out;
            position: absolute;
        }

        #email:hover {
            height: 40px;
        }

        .fp {
            color: #fff;
            position: absolute;
            top: 10px;
            font-size: 30px;
            text-align: center;
        }

        .pass {
            color: black;
            background: #fff;
            border: none;
            width: 50%;
            position: relative;
            height: 40px;
            top: -100px;
            transition: all 0.4s ease;
            font-size: 20px;
        }

        .pass:hover {
            width: 55%;
            height: 45px;
            font-size: 21px;
        }

        #msg {
            width: auto;
            min-width: 450px;
            height: 50px;
            color: white;
            position: fixed;
            border: none;
            z-index: 10000000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: absolute;
            top: 10px;
            font-weight: bold;
            font-size: 20px;
        }

        .msgc {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .email {
            width: 90%;
            height: 40%;
            position: relative;
            text-align: left;
            top: -30px;
        }

        .wht {
            width: 80px;
            height: 430px;
            background: #de0000;
            color: black;
            position: absolute;
            z-index: 1000;
            top: 70px;
            border-radius: 10px;
        }

        .eyeplace {
            background: #000;
            width: 100%;
            height: 0px;
            display: flex;
            align-items: center;
            position: relative;
            top: 60px;
            display: flex;
            justify-content: center;
            gap: 4px;
            transform: translateX(0px);
            transition: all 0.95s ease;
        }

        .eye {
            width: 20px;
            height: 40px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            position: relative;
            z-index: 100;
            overflow: hidden;
        }

        .eyeball1 {
            width: 10px;
            height: 10px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            transform: translateX(90%);
            pointer-events: none;
            z-index: 100;
            transition: all 1s ease;
        }

        .eyeball2 {
            width: 10px;
            height: 10px;
            background-color: #000;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            transform: translateX(90%);
            pointer-events: none;
            z-index: 100;
            transition: all 1s ease;
        }

        .mt {
            width: 10px;
            height: 20px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 100px;
            transform: translateX(38px);
            transition: all 0.95s ease;
            border: 2px solid black;

        }

        .lid {
            width: 20px;
            height: 40px;
            background: #131313;
            position: absolute;
            top: -40px;
            /* hidden at start */
            left: 0;
            border-radius: 75px / 40px;
            animation: blink 5s infinite;
            /* blink every 4 seconds */
            z-index: 1000;
        }

        .moveeye {
            transition: all 0.95s ease;
            transform: translateX(-10px);
        }

        .moveeye .eyeball1 {
            transition: all 1s ease;
            transform: translateX(0%);
        }

        .moveeye .eyeball2 {
            transition: all 1s ease;
            transform: translateX(0%);
        }

        .movemouth {
            transition: all 0.95s ease;
            transform: translateX(10px);
            width: 40px;
            height: 0px;
            background: black;
            border: 2px solid black;
            border-radius: 0%;

        }

        @keyframes blink {

            0%,
            90%,
            100% {
                top: -40px;
            }

            /* eye open */
            95% {
                top: 0px;
            }

            /* eye closed */
        }

        .mw {
            width: 80px;
            height: 40px;
            color: black;
            background: white;
            text-align: center;
            font-size: 20px;
            transform: translateY(20px);
            clip-path: polygon(0% 0%, 100% 0%, 100% 80%, 60% 80%, 50% 100%, 40% 80%, 0% 80%);
            position: absolute;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .float {
            animation: wow 0.8s alternate infinite ease-in-out;
        }

        @keyframes wow {
            to {
                transform: translateY(15px);
            }
        }

        .god {
            animation: wow 0.8s alternate infinite ease-in-out, down 1s forwards;
        }

        @keyframes down {
            0% {
                transform: translateY(20px);
                z-index: 100;
            }

            50% {
                transform: translateY(100px);
                z-index: 1;
            }

            100% {
                transform: translateY(20px);
                z-index: 100;
            }
        }

        .ctnc {
            display: flex;
            justify-content: center;
            background-color: green;
            width: 80px;
            height: fit-content;
            position: absolute;
            right: 5px;
            animation: jump 2s forwards;
        }

        @keyframes jump {
            0% {
                transform: translateY(-100px);
            }

            40% {
                transform: translateY(10px);
            }

            50% {
                transform: translateY(-50px) rotateY(90deg);
            }

            60% {
                transform: translateY(-60px) rotateY(180deg);
            }

            70% {
                transform: translateY(-70px) rotateY(270deg);
            }

            80% {
                transform: translateY(-80px) rotateY(360deg);
            }

            100% {
                transform: translateY(0px) rotateY(360deg);
                transform: scale(1);
            }
        }


        @media (min-width:765px) {
            .ctn {
                width: 70%;
            }

            .ctnc {
                right: 25px;
            }

            .fp {
                font-size: 40px;
            }

        }

        @media (min-width:1025px) {
            .ctn {
                width: 60%;
            }

            .ctnc {
                right: 45px;
            }
        }
    </style>

</head>

<body>
    <div class="msgc">
        <div id="msg"></div>
    </div>
    <h2 class="fp">Forgot Password</h2>

    <div class="ctn">
        <div class="lt">
            <br><br><br>
            <div class="email"> Email:<br>
                <input type="email" placeholder="Enter your Email" id="email"><br><br><br><br>
            </div>
            <button class="pass" onclick="forgotPassword()">continue</button>
        </div>
        <div class="ctnc">
            <div class="wht">
                <div class="eyeplace" id="ball">
                    <div class="eye">
                        <div class="eyeball1" id="ff"></div>
                        <div class="lid"></div>
                    </div>
                    <div class="eye">
                        <div class="eyeball2" id="ff"></div>
                        <div class="lid"></div>
                    </div>
                </div>
                <div class="mt" id="mm"></div>

            </div>
            <div class="mw" id="ms">WOW</div>
        </div>
    </div>
    <script src="javascript/forgot.js" type="module"></script>
    <script>
        const ball = document.getElementById("ball");
        document.getElementById("ms").classList.add("float");
        document.getElementById("email").addEventListener("mouseover", function () {
            ball.classList.add("moveeye");
            document.getElementById("mm").classList.add("movemouth");
        });
        document.getElementById("email").addEventListener("mouseout", function () {
            ball.classList.remove("moveeye");
            document.getElementById("mm").classList.remove("movemouth");
        });
        document.getElementById("email").addEventListener("click", function (e) {
            e.stopPropagation();
            document.getElementById("ms").classList.remove("god");
            void document.getElementById("ms").offsetwidth;
            document.getElementById("ms").classList.add("god");

            setTimeout(() => {
                document.getElementById("ms").textContent = "Email!";
            }, 500);
        });
        document.addEventListener("click", function (e) {
            if (!email.contains(e.target)) {
                document.getElementById("ms").classList.remove("god");
                void document.getElementById("ms").offsetwidth;
                document.getElementById("ms").classList.add("god");
                document.getElementById("ms").classList.remove("god");
                setTimeout(() => {
                    document.getElementById("ms").classList.add("god");
                }, 500);
                setTimeout(() => {
                    document.getElementById("ms").classList.remove("god");
                }, 1250);
                setTimeout(() => {
                    document.getElementById("ms").textContent = "WOW";
                }, 800);
            }
        });
    </script>
</body>

</html>
