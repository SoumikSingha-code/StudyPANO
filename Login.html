<!DOCTYPE html-5>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
    <title>
        StudyPANO Login
    </title>
    <style>
        body {
            background-color: #0f172a;
            overflow-x: hidden;
            overflow-y: hidden;
            color: white;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .lc1 {
            width: 350px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            background: linear-gradient(to right bottom, blue, #9c029c, red);
            border: none;
            border-radius: 8px;
            position: absolute;
            transform: translateY(635px);
            transition: all 0.8s ease-in;
        }

        .lc1.show {
            transform: translateY(0px);
        }

        .lc2 {
            width: 30dvh;
            text-align: left;
            display: grid;
            position: relative;
        }

        .btc {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            background: white;
            border: none;
            width: 100px;
            height: 40px;
            transition: all 0.3s ease;
            font-size: medium;
            border-radius: 10px;
        }

        button:hover {
            width: 105px;
            box-shadow: 0 0 10px cyan;
        }

        input {
            text-align: center;
            border: none;
            border-radius: 7px;
            width: 100%;
            height: 30px;
            transition: all 0.2s ease;

        }

        input:hover {
            height: 35px;
        }

        a {
            color: #bbb;
            text-align: center;
            text-decoration: none;
        }

        a:hover {
            color: #fff;
        }

        span {
            position: relative;
            right: 29px;
            cursor: pointer;
            background: none;
        }

        .password {
            display: flex;
            align-items: center;
            width: 110%;
        }


        #message {
            background-color: red;
            text-align: center;
            position: absolute;
            top: 10px;
            z-index: 999;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 10px;
        }

        .log {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            top: 50px;
        }

        #msg {
            width: auto;
            min-width: 450px;
            height: 50px;
            color: white;
            position: fixed;
            top: 10px;
            border: none;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .msgc {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ld {
            width: 100%;
            height: 110%;
            display: none;
            align-items: center;
            justify-content: center;
            background: transparent;
            backdrop-filter: blur(10px);
            z-index: 999;
        }

        .ld.show {
            display: flex;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 8px solid #ddd;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (min-width:765px) {
            .lc1 {
                width: 500px;
                height: 600px;
            }

            .lc2 {
                width: 45dvh;
                text-align: left;
                display: grid;
                font-size: large;
            }

            .password {
                width: 106.5%;
            }
        }

        @media (min-width:1025px) {
            .lc1 {
                width: 700px;
                height: 750px;
                padding: 10px;
                margin: 10px;
            }

            .lc2 {
                width: 50dvh;
                text-align: left;
                display: grid;
                font-size: larger;
                top: -10px;
            }

            .password {
                width: 105.5%;
            }
        }
    </style>
</head>

<body>

    <div class="lc1" id="lc1">
        <div class="log">
            <h1>Login</h1>
        </div>
        <form class="frm">
            <div class="lc2">

                Name:<br>
                <input type="text" id="name" class="inp" placeholder="Enter your name">
                <br>
                Email<br>
                <input type="email" id="email" class="inp" placeholder="Enter your email">
                <br>
                Password:<br>
                <div class="password">
                    <input type="password" id="pass" class="inp" placeholder="Enter your password" maxlength="10">
                    <span id="toggle1" class="toggle" onclick="toggle1()">🙈</span>
                </div>

                <br>
                Verify Password:<br>
                <div class="password">

                    <input type="password" id="passcheck" class="inp" placeholder="Enter your password to verify"
                        maxlength="10">
                    <span id="toggle2" class="toggle" onclick="toggle2()">🙈</span>
                </div><br>
                <div class="btc"><button id="signin" type="button" onclick="check1(),check2()">Sign in</button></div>
                <br>
                <a href="forgot.html">Forgot Password?</a><br><br>
                <br>

            </div>
        </form>
    </div>
    </form>

    <div class="msgc">
        <div id="msg"></div>
    </div>
    <div class="ld" id="load">
        <div class="loader"></div>
    </div>
    <script src="javascript/login.js"></script>
</body>

</html>
