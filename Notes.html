<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>StudyPANO Notes</title>
    <style>
        html,
        body {
            background-color: #0f172a;
            overflow-x: hidden;
            color: white;
            overflow-y: auto;
            margin: 0px;
            padding: 0px;
            max-width: 100%;
        }

        .panel::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 3px;
            background: linear-gradient(to right bottom, cyan, #9c029c);
            transition: 0.3s;
        }

        .panel.active::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right bottom, cyan, #9c029c);
            transition: 0.3s;
        }

        .panel.active {
            background: linear-gradient(to right bottom, cyan, #9c029c);
            color: white;
            transform: translateY(-10px);
            /* move upward */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .panel:hover::after {
            width: 100%;
        }

        .panel.active::before {
            content: "";
            position: absolute;
            top: 0;
            left: -12%;
            width: 90%;
            height: 100%;
            background: #ffffff2e;
            transform: skewX(-50deg);
            animation: shine 4s linear infinite;

        }

        @keyframes shine {
            0% {
                left: -130%;
            }

            100% {
                left: 150%;
            }
        }

        .top-panels {
            display: flex;
            gap: 5px;
            background: #333;
            width: 100%;
            height: 80px;
            justify-content: center;
            position: sticky;
            top: 0px;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
            margin: 0px;
        }

        .panel {
            color: white;
            width: 100px;
            height: 40px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-left: 10px;
        }


        i {
            position: relative;
            right: 5px;
            font-size: 15px;
        }



        /* Hover effect */
        .panel:hover {
            background: linear-gradient(to right bottom, cyan, #9c029c);
            color: white;
            transform: translateY(-10px);
            /* move upward */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .txt h1 {
            color: white;
            position: relative;
            top: 55px;
            text-align: center;
        }


        .txt {
            color: white;
            font-size: larger;
            font-family: 'Times New Roman', Times, serif;
            width: 100%;
        }

        .container {
            display: flex;
            justify-content: center;
            width: 100%;
            position: relative;
            top: -20px;
        }

        body::-webkit-scrollbar {
            width: 8px;
        }

        body::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }

        body::-webkit-scrollbar-thumb {
            background: #64748b;
            border-radius: 10px;
        }

        body::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .lin {
            width: 100%;
            height: 1px;
            background-color: white;
        }

        a {
            color: whitesmoke;
        }

        .blc {
            width: 200px;
            height: 200px;
            background: linear-gradient(to right top, navy, crimson);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            filter: brightness(1.3);
        }

        .blc:hover {
            width: 210px;
            height: 210px;
        }

        .blc::before {
            content: "";
            position: absolute;
            top: 0;
            left: -12%;
            width: 60%;
            height: 100%;
            background: #ffffff2e;
            transform: skewX(-45deg);
            animation: shine 5s linear infinite;

        }

        .blc:hover::before {
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            0% {
                left: -150%;
            }

            100% {
                left: 150%;
            }
        }

        .r1 {
            width: 100%;
            display: flex;
            text-align: center;
            gap: 10px;
        }

        .r2 {
            width: 100%;
            display: flex;
            text-align: center;
            gap: 10px;
        }

        .r3 {

            text-align: center;
            gap: 10px;
        }

        .r4 {

            text-align: center;
            gap: 10px;

        .bl {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        html {
            scroll-behavior: smooth;
        }

        .b4 {
            position: fixed;
            bottom: 130px;
            right: 7%;
            width: 60px;
            height: 60px;
            color: white;
            background: linear-gradient(to right top, rgb(167, 0, 0), rgb(0, 0, 158));
            border: none;
            font-size: 20px;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .b4:hover {
            width: 62px;
            height: 62px;
            border: none;
        }

        .arr {
            position: relative;
            top: -20px;
        }

        a {
            text-decoration: none;
        }

            }

            .r4 {

                ;
            }

            .r5 {

                justify-content: center;

            }

            .b4 {

            }

            .b4:hover {
                width: 92px;

            }

            .r1 {

            }

            .r2 {
                width: 100%;

            }

            .r3 {

            }

            .r4 {

                ;
            }

            .r5 {
                width: 100%;
                display: flex;

            }

            .b4 {
                position: fixed;
                bottom: 130px;

                align-items: center;
                justify-content: center;
            }

            .b4:hover {
                width: 82px;

                border: none;
            }

            .arr {
                position: relative;
                top: -2px;
            }

            i {
                right: 10px;
                font-size: 20px;
            }
        }
